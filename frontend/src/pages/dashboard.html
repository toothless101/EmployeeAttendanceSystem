<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
    <link rel="stylesheet" href="/src/css/style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Document</title>
</head>
<body>
    <div id="sidebar-container"></div>
        <div class="p-4 sm:ml-64">
            <div class="grid grid-cols-3 md:grid-cols-3  gap-2 md:gap-5 m-4">
                <div class="hidden md:block md:col-start-2 md:row-start-2 md:col-span-2 md:row-span-2 bg-gray-300 rounded-md p-5" id="presentEmployees">
                    <h3 class="text-[#394958] font-bold">Present Employees List</h3>
                    <table class="w-full text-sm text-left rtl:text-right text-body">

                        <thead class="text-sm text-body bg-neutral-secondary-soft border-b-2 border-[#394958] rounded-base border-default">
                            <tr>
                                <th scope="col" class="px-6 py-3 font-medium text-center text-[#1e2f3d]">Name</th>
                                <th scope="col" class="px-6 py-3 font-medium text-center text-[#1e2f3d]">Department</th>
                                <th scope="col" class="px-6 py-3 font-medium text-center text-[#1e2f3d]">Date</th>
                                <th scope="col" class="px-6 py-3 font-medium text-center text-[#1e2f3d]">Time In</th>
                            </tr>
                        </thead>

                        <tbody id="attendanceTableBody"></tbody>

                    </table>
                </div>
                <div class="hidden md:block md:col-start-1 md:row-start-1 md:col-span-1 md:row-span-1 bg-[#394958] rounded-md p-5" id="totalEmployees">
                    <h3 class="text-white font-bold">Total Employees</h3>
                    <h1 id="totalNumberOfEmployees"></h1>
                </div>
                <div class="hidden md:block md:col-start-2 md:row-start-1 md:col-span-1 md:row-span-1 bg-gray-300 rounded-md p-5" id="totalPresent">
                    <h3 class="text-[#394958] font-bold">Present Today</h3>
                    <h1 id="totalPresentToday"></h1>
                </div>
                <div class="hidden md:block md:col-start-3 md:row-start-1 md:col-span-1 md:row-span-1 bg-gray-300 rounded-md p-5" id="totalDepartments">
                    <h3 class="text-[#394958] font-bold">Departments</h3>
                    <h1 id="totalNumberOfDepartments"></h1>
                </div>
                <div class="hidden md:block md:col-start-1 md:row-start-2 md:col-span-1 md:row-span-1 bg-gray-300 rounded-md p-5" id="currTime">
                    <h3 class="text-[#394958] font-bold">Current Time</h3>
                    
                    <div>
                        <h2 id="currentTime" class="font-bold"></h2>
                    </div>

                    <h6 id="currentDate"></h6>
                </div>
                <!-- <div class="hidden md:block md:col-start-1 md:row-start-3 md:col-span-1 md:row-span-1 bg-gray-300 rounded-md p-10" id="Dchart">
                        <canvas id="myChart"></canvas>
                    </div>  -->
                    <div class="hidden md:block md:col-start-1 md:row-start-3 md:col-span-1 md:row-span-1 bg-gray-300 rounded-md p-5" id="Dchart">
                        <div class="w-60 h-60 mx-auto">
                            <canvas id="myChart"></canvas>
                        </div>
                    </div>
            </div>
        </div>

    </div>
    
    <script src="/js/loadSidebar.js"></script>
    <script src="/js/dashboard.js"></script>

</body>
</html>
