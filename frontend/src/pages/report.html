<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
    <link rel="stylesheet" href="/src/css/style.css">
    <title>Document</title>
</head>
<body>
    <div id="sidebar-container"></div>
    <div class="p-4 sm:ml-64">
        <div class="flex gap-3 mb-4">

            <div class="relative max-w-sm">
                <div class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none">
                    <svg class="w-4 h-4 text-body" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 10h16m-8-3V4M7 7V4m10 3V4M5 20h14a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1H5a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1Zm3-7h.01v.01H8V13Zm4 0h.01v.01H12V13Zm4 0h.01v.01H16V13Zm-8 4h.01v.01H8V17Zm4 0h.01v.01H12V17Zm4 0h.01v.01H16V17Z"/></svg>
                </div>
                <input id="reportDate" type="date" class="block w-full ps-9 pe-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Select date">
            </div>
            

                <button id="searchReportBtn" class="bg-blue-500 text-white px-4 py-2 rounded">
                    Search
                </button>
                <button id="printBtn" class="bg-green-500 text-white px-4 py-2 rounded flex-end">
                    Print Report
                </button>
            </div>

        <div id="reportSection" class=" relative overflow-x-auto bg-neutral-primary-soft shadow-xs rounded-2xl bg-[#F8F8F8] border border-default mt-4">

        <h3 class="text-center font-bold text-m p-4 text-[#354958]">Employee Attendance Report</h3>
            <p class="text-center mb-6">
                Date: <span id="printDate"></span>
            </p>
            <table class="w-full text-sm text-left rtl:text-right text-body">

            <thead class="text-sm text-body bg-neutral-secondary-soft border-b-2 border-t-2 border-gray-300 rounded-base border-default">
                <tr>
                    <th scope="col" class="px-6 py-3 font-medium text-center text-[#1e2f3d]">Image</th>
                    <th scope="col" class="px-6 py-3 font-medium text-center text-[#1e2f3d]">Name</th>
                    <th scope="col" class="px-6 py-3 font-medium text-center text-[#1e2f3d]">Department</th>
                    <th scope="col" class="px-6 py-3 font-medium text-center text-[#1e2f3d]">Position</th>
                    <th scope="col" class="px-6 py-3 font-medium text-center text-[#1e2f3d]">Time In</th>
                    <th scope="col" class="px-6 py-3 font-medium text-center text-[#1e2f3d]">Time Out</th>
                    <th scope="col" class="px-6 py-3 font-medium text-center text-[#1e2f3d]">Status</th>
                </tr>
            </thead>

            <tbody id="reportTable"></tbody>

        </table>
        </div>
    </div>
    
    <script src="/js/loadSidebar.js"></script>
    <script src="/js/report.js"></script>
</body>
</html>
